version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: marrrweco_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: the_marrrweco
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - marrrweco_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    image: php:8.2-fpm
    container_name: marrrweco_php
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./backend/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: the_marrrweco
      DB_USER: postgres
      DB_PASSWORD: password
      JWT_SECRET: your-secret-jwt-key-change-this
      APP_ENV: development
    networks:
      - marrrweco_network
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: marrrweco_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/app
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - marrrweco_network
    depends_on:
      - php

  node:
    image: node:18-alpine
    container_name: marrrweco_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      REACT_APP_API_URL: http://localhost:8000
    networks:
      - marrrweco_network
    command: npm start

volumes:
  postgres_data:

networks:
  marrrweco_network:
    driver: bridge
